[main]
font=HackGen Console NF:size=14
dpi-aware=no
prompt="❯❯ "
terminal=wezterm

lines=16
width=50
tabs=4
horizontal-pad=50
vertical-pad=18
inner-pad=10

image-size-ratio=.25

keyboard-focus=on-demand
exit-on-keyboard-focus-loss=yes

[border]
width=1

[colors]
background=282a36dd
text=f8f8f2ff
match=8be9fdff
selection-match=8be9fdff
selection=44475add
selection-text=f8f8f2ff
border=bd93f9ff
