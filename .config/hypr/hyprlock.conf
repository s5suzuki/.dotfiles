background {
    monitor =
    path = screenshot
    
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true]
    
    outer_color = rgb(30, 30, 46)
    inner_color = rgb(17, 17, 27)
    font_color = rgb(205, 214, 244)
    
    fade_on_empty = false
    placeholder_text = <i>Enter Password...</i>
    hide_input = false
    
    position = 0, -50
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    text_align = center
    color = rgba(205, 214, 244, 1.0)
    font_size = 120
    font_family = sans-serif
    
    position = 0, 100
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:18000000] echo "<b> "$(date +'%Y年%m月%d日')" </b>"
    text_align = center
    color = rgba(205, 214, 244, 1.0)
    font_size = 24
    font_family = sans-serif
    
    position = 0, 20
    halign = center
    valign = center
}